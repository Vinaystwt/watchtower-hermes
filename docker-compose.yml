version: "3.8"

services:
  vertex-db:
    image: postgres:14
    container_name: vertex-db
    environment:
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower123
      POSTGRES_DB: vertexdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  vertex-app:
    build: ./app
    container_name: vertex-app
    depends_on:
      - vertex-db
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: postgresql://watchtower:watchtower123@vertex-db/vertexdb
    volumes:
      - ./logs:/app/logs
      - ./skills:/app/skills

volumes:
  pgdata:
